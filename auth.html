<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership Portal | Wild Card Tennis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <a href="index.html" style="text-decoration: none;">
                <div class="logo-container" style="justify-content: center; margin-bottom: 2rem;">
                    <img src="logo.png" alt="Logo">
                    <span style="color: var(--primary-green);">WILD CARD</span>
                </div>
            </a>

            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login">Login</div>
                <div class="auth-tab" id="tab-signup">Sign Up</div>
            </div>

            <button type="button" class="google-btn" id="btn-google">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>

            <div class="auth-separator">OR</div>

            <!-- LOGIN FORM -->
            <form id="form-login" class="auth-form active">
                <div class="auth-input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="player@example.com" required>
                </div>
                <div class="auth-input-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="cta-button" style="width: 100%; margin-top: 1rem;">Enter Locker Room</button>
                <p style="font-size: 0.8rem; margin-top: 1rem; color: #777;">Forgot your password?</p>
            </form>

            <!-- SIGNUP FORM -->
            <form id="form-signup" class="auth-form">
                <div class="auth-input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="auth-input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="player@example.com" required>
                </div>
                <div class="auth-input-group">
                    <label>Choose Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <div style="display: flex; align-items: flex-start; gap: 10px; text-align: left; margin-top: 1rem;">
                    <input type="checkbox" required>
                    <p style="font-size: 0.7rem; color: #777;">I agree to the Wild Card Tennis Membership Terms and Conditions.</p>
                </div>
                <button type="submit" class="cta-button" style="width: 100%; margin-top: 1rem;">Join the Elite</button>
            </form>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
